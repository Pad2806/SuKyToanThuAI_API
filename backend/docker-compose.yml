version: '3.8'
services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - content-service
      - media-service
      - education-service
      - workspace-service

  auth-service:
    build: ./auth_service
    ports:
      - "8001:8000"
    volumes:
      - ./auth_service:/app
    env_file: .env.example

  content-service:
    build: ./content_service
    ports:
      - "8002:8000"
    volumes:
      - ./content_service:/app
    env_file: .env.example

  media-service:
    build: ./media_service
    ports:
      - "8003:8000"
    volumes:
      - ./media_service:/app
    env_file: .env.example

  education-service:
    build: ./education_service
    ports:
      - "8004:8000"
    volumes:
      - ./education_service:/app
    env_file: .env.example

  workspace-service:
    build: ./workspace_service
    ports:
      - "8005:8000"
    volumes:
      - ./workspace_service:/app
    env_file: .env.example

