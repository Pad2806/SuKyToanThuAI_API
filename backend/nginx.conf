events {
    worker_connections 1024;
}

http {
    # CORS Configuration
    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:3000$" "$http_origin";
    }

    server {
        listen 80;
        server_name localhost;

        # Gộp tất cả /api/v1/auth vào Auth Service
        location /api/v1/auth/ {
            proxy_pass http://auth-service:8001/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Content Service
        location /api/v1/content/ {
            proxy_pass http://content-service:8002/api/v1/content/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Media Service (AI Visual)
        location /api/v1/media/ {
            proxy_pass http://media-service:8003/api/v1/media/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Education Service
        location /api/v1/education/ {
            proxy_pass http://education-service:8004/api/v1/education/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Workspace Service
        location /api/v1/workspace/ {
            proxy_pass http://workspace-service:8005/api/v1/workspace/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Catch all cho local health check chung (nếu cần)
        location / {
            return 200 '{"status": "API Gateway is running"}';
            add_header Content-Type application/json;
        }
    }
}
